name: Check dotfiles

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zsh

      - name: Run checks
        run: ./check.sh
